<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>境界夜話｜編集長プロジェクト</title>
  <meta name="description" content="真壁夜話・黒瀬蒐集録・榊家異聞・境界観測記の4シリーズを掲載する、編集長プロジェクト専用サイトです。">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://allsunday1122.github.io/Kohei-Morita000.github.io/">
  <style>
    :root{color-scheme:dark;background:#080a0f;color:#ece7dc;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    *{box-sizing:border-box}
    body{margin:0;min-height:100dvh;background:radial-gradient(circle at top,#202536 0,#0b0e15 42%,#07080c 100%);display:grid;place-items:center;padding:28px}
    main{width:min(760px,100%);border:1px solid #393641;background:rgba(11,14,21,.9);padding:44px 34px;box-shadow:0 22px 70px rgba(0,0,0,.45)}
    .eyebrow{letter-spacing:.18em;color:#aaa1b5;font-size:.78rem}
    h1{font-family:serif;font-size:clamp(2.2rem,7vw,4.6rem);font-weight:500;margin:.25em 0 .35em}
    p{line-height:1.9;color:#d0c9bd}
    ul{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;padding:0;margin:28px 0;list-style:none}
    li{border:1px solid #34313a;padding:16px 18px;background:#11141d}
    .note{border-top:1px solid #302d35;padding-top:22px;color:#928b84;font-size:.9rem}
    @media(max-width:560px){main{padding:34px 22px}ul{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">EDITORIAL HORROR ARCHIVE</div>
    <h1>境界夜話</h1>
    <p>編集長プロジェクト専用の独立ホラーサイトです。掲載対象は、次の4シリーズに限定します。</p>
    <ul>
      <li>真壁夜話</li>
      <li>黒瀬蒐集録</li>
      <li>榊家異聞</li>
      <li>境界観測記</li>
    </ul>
    <p class="note">「怖い話（単独）」の作品・設定・登場人物・公開データは、このサイトでは取り扱いません。作品ページは分離監査後に順次公開します。</p>
  </main>
</body>
</html>
