<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>宴会ミニゲーム横丁</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=RocknRoll+One&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="lantern-row" aria-hidden="true">
          <span class="lantern">遊</span>
          <span class="lantern">宴</span>
          <span class="lantern">笑</span>
        </div>
        <div class="title-lockup">
          <p class="eyebrow">2〜4人 / スマホ1台 / 5分以内</p>
          <h1>宴会ミニゲーム横丁</h1>
          <p class="site-sub">札をめくって、場をあたためる十番勝負</p>
        </div>
        <button class="icon-button" id="reset-game" type="button" title="このゲームを最初から">
          <span aria-hidden="true">↻</span>
        </button>
      </header>

      <main class="layout">
        <aside class="side-panel" aria-label="ゲームとプレイヤー設定">
          <section class="player-panel">
            <div class="panel-title">
              <span>本日のお客さま</span>
              <strong id="selected-player-count">4人</strong>
            </div>
            <div class="segmented" id="player-count"></div>
            <div class="name-list" id="player-names"></div>
          </section>

          <nav class="game-list" id="game-list" aria-label="ゲーム一覧"></nav>
          <a class="side-link" href="./codex-nomikai-arcade.html">
            採用候補: 呑み処アーケード DX
          </a>
          <a class="side-link" href="./nonal-game-app/index.html">
            別暖簾: ノンアルゲームテーブル
          </a>
        </aside>

        <section class="stage" id="game-root" aria-live="polite"></section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
