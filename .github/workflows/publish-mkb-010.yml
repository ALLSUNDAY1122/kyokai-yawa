name: Publish MKB-010

on:
  push:
    paths:
      - '.publication-trigger-mkb-010'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update archive
        run: python tools/publish_mkb_010.py
      - name: Commit publication
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html sitemap.xml
          git rm -f tools/publish_mkb_010.py .publication-trigger-mkb-010 .github/workflows/publish-mkb-010.yml
          git commit -m "List MKB-010 on archive"
          git push
