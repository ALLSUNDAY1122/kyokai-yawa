name: Public Site Health Audit

on:
  schedule:
    - cron: '45 21 * * *' # 06:45 JST
  workflow_run:
    workflows:
      - 'Public Reading Browser Audit'
    types: [completed]
  push:
    paths:
      - 'package.json'
      - 'playwright.config.mjs'
      - 'tests/site-health.spec.mjs'
      - 'scripts/site-health-reporter.mjs'
      - 'scripts/audit-site-health-workflow.mjs'
      - '.github/workflows/public-site-health-audit.yml'
  workflow_dispatch:

concurrency:
  group: public-site-health-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  site-health:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PLAYWRIGHT_BASE_URL: https://allsunday1122.github.io/kyokai-yawa/
      SITE_HEALTH_REPORT: site-public-health-audit.md
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Audit public health schedule and safeguards
        run: node scripts/audit-site-health-workflow.mjs
      - name: Wait for GitHub Pages deployment
        if: github.event_name != 'schedule'
        run: sleep 60
      - name: Install browser test dependencies
        run: npm install --no-audit --no-fund
      - name: Install Chromium and WebKit
        run: npx playwright install --with-deps chromium webkit
      - name: Audit accessibility runtime errors and failed requests
        id: tests
        continue-on-error: true
        run: npx playwright test tests/site-health.spec.mjs --retries=1
      - name: Upload accessibility report traces screenshots and videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-site-health-audit
          path: |
            reports/site-health-workflow-audit.md
            reports/site-public-health-audit.md
            playwright-report
            test-results
          if-no-files-found: warn
          retention-days: 14
      - name: Commit public site health reports
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/site-health-workflow-audit.md reports/site-public-health-audit.md
          if git diff --cached --quiet; then
            echo "Public site health reports are unchanged."
          else
            git commit -m "chore: record public site health audit"
            git pull --rebase origin main
            git push
          fi
      - name: Fail when public site health tests fail
        if: steps.tests.outcome == 'failure'
        run: exit 1
