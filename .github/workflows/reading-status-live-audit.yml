name: Live Reading Status Audit

on:
  workflow_run:
    workflows: ['Reading Status']
    types: [completed]
  workflow_dispatch:

concurrency:
  group: live-reading-status-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  audit-live:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Wait for GitHub Pages deployment
        run: sleep 20
      - name: Audit production reading status management
        run: node scripts/audit-live-reading-status.mjs
      - name: Commit production audit report
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/live-reading-status-audit.md
          if git diff --cached --quiet; then
            echo "Production reading status audit is unchanged."
          else
            git commit -m "chore: record reading status production audit"
            git pull --rebase origin main
            git push
          fi
