name: Entry Guide Live Audit

on:
  push:
    paths:
      - 'index.html'
      - 'data/entry-guide.css'
      - 'series/**'
      - 'stories/mkb-001-taikin-kiroku-2514.html'
      - 'stories/krs-001-sanbonme-no-sakaigi.html'
      - 'stories/skk-001-butsuma-no-natsufuku.html'
      - 'stories/kks-s1e01-sakaime-no-heya.html'
      - 'scripts/audit-live-entry-guide.mjs'
      - '.github/workflows/entry-guide-live-audit.yml'
  workflow_dispatch:

concurrency:
  group: entry-guide-live-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  audit-production:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Wait for GitHub Pages and audit entry guide
        run: |
          success=0
          for attempt in $(seq 1 30); do
            echo "Entry guide production audit ${attempt}/30"
            if node scripts/audit-live-entry-guide.mjs; then
              success=1
              break
            fi
            sleep 10
          done
          if [ "$success" -ne 1 ]; then
            echo "Published entry guide did not pass within the deployment window."
            exit 1
          fi

      - name: Upload production report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-entry-guide-audit-report
          path: reports/live-entry-guide-audit.md
          if-no-files-found: error

      - name: Commit production report
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/live-entry-guide-audit.md
          if git diff --cached --quiet; then
            echo "Production entry guide report is unchanged."
          else
            git commit -m "chore: record first-time reader production audit"
            git pull --rebase origin main
            git push
          fi
