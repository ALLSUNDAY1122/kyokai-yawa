name: Saved Stories Audit

on:
  push:
    paths:
      - 'index.html'
      - 'stories/**'
      - 'series/**'
      - 'service-worker.js'
      - 'data/works.js'
      - 'data/saved-stories.css'
      - 'data/saved-stories.js'
      - 'data/archive-tools.js'
      - 'data/series-archive-tools.js'
      - 'data/home-personalization.css'
      - 'data/home-personalization.js'
      - 'scripts/normalize-home-personalization.mjs'
      - 'scripts/normalize-saved-stories.mjs'
      - 'scripts/normalize-saved-stories-offline.mjs'
      - 'scripts/audit-home-personalization.mjs'
      - 'scripts/audit-saved-stories.mjs'
      - '.github/workflows/saved-stories-audit.yml'
  workflow_dispatch:

concurrency:
  group: saved-stories-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Normalize personalized homepage
        run: node scripts/normalize-home-personalization.mjs
      - name: Normalize save for later assets
        run: node scripts/normalize-saved-stories.mjs
      - name: Normalize save for later offline assets
        run: node scripts/normalize-saved-stories-offline.mjs
      - name: Audit personalized homepage
        id: personalization
        continue-on-error: true
        run: node scripts/audit-home-personalization.mjs
      - name: Audit save for later management
        id: saved
        continue-on-error: true
        run: node scripts/audit-saved-stories.mjs
      - name: Commit generated pages and reports
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html stories series service-worker.js reports/home-personalization-audit.md reports/saved-stories-audit.md
          if git diff --cached --quiet; then
            echo "Saved stories pages and reports are unchanged."
          else
            git commit -m "chore: publish save for later management"
            git pull --rebase origin main
            git push
          fi
      - name: Fail when audit errors exist
        if: steps.personalization.outcome == 'failure' || steps.saved.outcome == 'failure'
        run: exit 1
