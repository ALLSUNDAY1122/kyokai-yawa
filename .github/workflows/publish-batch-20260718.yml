name: Publish approved stories 2026-07-18

on:
  push:
    branches: [main]
    paths:
      - publish-batch-20260718.trigger

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Patch validation message and compile
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('publish_batch_20260718.py')
          text = path.read_text(encoding='utf-8')
          old = '    raise RuntimeError(f"Expected 32 work cards, got {index.count(\'class=\\"work-card\\"\')}")'
          new = '    raise RuntimeError("Expected 32 work cards, got %s" % index.count(\'class="work-card"\'))'
          if old not in text:
              raise SystemExit('Expected validation line was not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          python -m py_compile publish_batch_20260718.py
      - name: Publish stories and update archive
        run: python publish_batch_20260718.py
