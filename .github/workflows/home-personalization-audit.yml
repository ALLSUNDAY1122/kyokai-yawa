name: Home Personalization

on:
  push:
    paths:
      - 'index.html'
      - 'data/works.js'
      - 'data/story-taxonomy.json'
      - 'data/reading-status.js'
      - 'data/reader-tools.js'
      - 'data/home-personalization.css'
      - 'data/home-personalization.js'
      - 'scripts/normalize-home-personalization.mjs'
      - 'scripts/audit-home-personalization.mjs'
      - '.github/workflows/home-personalization-audit.yml'
  workflow_dispatch:

concurrency:
  group: home-personalization-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Normalize personalized home entry points
        run: node scripts/normalize-home-personalization.mjs
      - name: Audit personalized home entry points
        id: audit
        continue-on-error: true
        run: node scripts/audit-home-personalization.mjs
      - name: Commit generated homepage and report
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html reports/home-personalization-audit.md
          if git diff --cached --quiet; then
            echo "Personalized homepage and report are unchanged."
          else
            git commit -m "chore: publish personalized return visitor entry points"
            git pull --rebase origin main
            git push
          fi
      - name: Fail when audit errors exist
        if: steps.audit.outcome == 'failure'
        run: exit 1
