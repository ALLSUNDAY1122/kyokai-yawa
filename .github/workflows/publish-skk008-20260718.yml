name: Publish SKK-008 2026-07-18

on:
  push:
    branches: [main]
    paths:
      - publish-skk008-20260718.trigger

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate publisher
        run: python -m py_compile publish_skk008_20260718.py
      - name: Publish SKK-008
        run: python publish_skk008_20260718.py
