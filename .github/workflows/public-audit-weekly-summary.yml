name: Public Audit Weekly Summary

on:
  schedule:
    - cron: '0 22 * * 0' # Monday 07:00 JST
  push:
    paths:
      - 'scripts/build-public-audit-weekly-summary.mjs'
      - 'scripts/audit-public-audit-weekly-summary.mjs'
      - '.github/workflows/public-audit-weekly-summary.yml'
  workflow_dispatch:

concurrency:
  group: public-audit-weekly-summary-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  weekly-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build seven-day public audit summary
        run: node scripts/build-public-audit-weekly-summary.mjs
      - name: Audit weekly summary and workflow safeguards
        run: node scripts/audit-public-audit-weekly-summary.mjs
      - name: Upload weekly summary and configuration audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-audit-weekly-summary
          path: |
            reports/public-audit-weekly-summary.md
            reports/public-audit-weekly-summary-workflow-audit.md
          if-no-files-found: error
          retention-days: 28
      - name: Commit weekly summary reports
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/public-audit-weekly-summary.md reports/public-audit-weekly-summary-workflow-audit.md
          if git diff --cached --quiet; then
            echo "Weekly public audit summary is unchanged."
          else
            git commit -m "chore: record weekly public audit summary"
            git pull --rebase origin main
            git push
          fi
