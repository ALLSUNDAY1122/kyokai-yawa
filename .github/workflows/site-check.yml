name: Site availability check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-live-site:
    runs-on: ubuntu-latest
    steps:
      - name: Verify published 夜語り site
        shell: bash
        run: |
          set -euo pipefail

          base="https://allsunday1122.github.io/Kohei-Morita000.github.io/yorugatari/"
          expected_path="/Kohei-Morita000.github.io/yorugatari/"

          status=$(curl -L -sS -o index.html -w '%{http_code}' --max-time 30 "$base")
          echo "HOME_STATUS=$status"
          test "$status" = "200"
          grep -F '<title>夜語り｜3分で読めるオリジナル怖い話</title>' index.html
          grep -F "<link rel=\"canonical\" href=\"${base}\">" index.html

          curl -L -sS --max-time 30 "${base}sitemap.xml" -o sitemap.xml
          url_count=$(grep -o '<url>' sitemap.xml | wc -l | tr -d ' ')
          echo "SITEMAP_URLS=$url_count"
          test "$url_count" = "17"
          grep -F "${base}stories/last-elevator.html" sitemap.xml

          curl -L -sS --max-time 30 "${base}site.webmanifest" -o site.webmanifest
          python - "$expected_path" <<'PY'
          import json
          import sys

          expected = sys.argv[1]
          with open('site.webmanifest', encoding='utf-8') as file:
              manifest = json.load(file)
          for key in ('id', 'start_url', 'scope'):
              actual = manifest.get(key)
              print(f'{key.upper()}={actual}')
              if actual != expected:
                  raise SystemExit(f'{key} mismatch: {actual!r}')
          PY

          curl -L -sS --max-time 30 "${base}stories/last-elevator.html" -o story.html
          grep -F "<link rel=\"canonical\" href=\"${base}stories/last-elevator.html\">" story.html

          curl -L -sS --max-time 30 "${base}contact.html" -o contact.html
          grep -F 'https://github.com/ALLSUNDAY1122/Kohei-Morita000.github.io/issues/new' contact.html
